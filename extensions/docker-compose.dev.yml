# J.A.R.V.I.S. - Local development stack
# Run from repository root:
#   cd extensions
#   docker compose -f docker-compose.dev.yml up -d --build

services:
  ollama-dev:
    image: ollama/ollama:latest
    container_name: jarvis_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0

  jarvis-qdrant:
    image: qdrant/qdrant:v1.16
    container_name: jarvis_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  jarvis-memory:
    build: ./memory
    container_name: jarvis-memory
    ports:
      - "8401:8401"
    environment:
      - OLLAMA_URL=http://jarvis_ollama:11434
      - QDRANT_URL=http://jarvis_qdrant:6333
    volumes:
      - memory_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8401/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  jarvis-voice:
    build: ./voice
    container_name: jarvis-voice
    ports:
      - "8402:8402"
    volumes:
      - voice_data:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8402/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  jarvis-vision:
    build: ./vision
    container_name: jarvis-vision
    ports:
      - "8405:8405"
    environment:
      - VISION_CAMERA_INDEX=0
    volumes:
      - vision_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8405/health"]
      interval: 10s
      timeout: 8s
      retries: 5

  jarvis-brain:
    build: ./brain
    container_name: jarvis-brain
    ports:
      - "8403:8403"
    environment:
      - OLLAMA_URL=http://jarvis_ollama:11434
      - MEMORY_URL=http://jarvis-memory:8401
      - VOICE_URL=http://jarvis-voice:8402
      - VISION_URL=http://jarvis-vision:8405
      - QDRANT_URL=http://jarvis_qdrant:6333
      - MOTORS_URL=http://jarvis-motors:8404
      - MODEL_NAME=gemma3:1b
      - MODEL_REASONING=qwen2.5:3b
      - JARVIS_LANGUAGE=es
      - JARVIS_ASCII_ONLY=true
    depends_on:
      jarvis-memory:
        condition: service_healthy
      jarvis-voice:
        condition: service_healthy
      jarvis-vision:
        condition: service_healthy

volumes:
  ollama_data:
  qdrant_data:
  memory_data:
  voice_data:
  vision_data:
